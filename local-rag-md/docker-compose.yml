services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: local-rag-postgres
    environment:
      POSTGRES_DB: local_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d local_rag"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

